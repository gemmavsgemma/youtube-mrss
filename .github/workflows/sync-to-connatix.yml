name: Sync YouTube to Connatix

# Nightly sync of new AVForums YouTube uploads to Connatix.
#
# Runs at 01:00 UTC. Diffs the MRSS feed against the Connatix library (the
# source of truth) and syncs anything in the feed that isn't already in
# Connatix. Idempotent — running multiple times in a row syncs nothing the
# second time round.
#
# Timing chain:
#   01:00 UTC  this workflow syncs new videos -> Connatix encodes (~5-30 min)
#   06:00 UTC  generate-mrss.yml regenerates avforums.xml
#   07:00 UTC  Worker hourly cron picks up the new join state -> KV
#              -> visible in gallery on next request
#
# Manual triggering supported via workflow_dispatch, including a dry_run
# mode for safe testing.

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would sync without uploading'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read   # No tracking-file writeback needed any more
  # Releases are managed via the GITHUB_TOKEN's default repo perms which
  # cover release create/delete on the repo where the workflow runs.

# Prevent overlapping runs. If a previous run is still going, queue rather
# than cancel — release management could get tangled by concurrent edits.
concurrency:
  group: sync-to-connatix
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4h ceiling; typical run ~3 min for 0–5 deltas

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests lxml yt-dlp python-dotenv google-api-python-client

      - name: Upgrade yt-dlp to latest
        # YouTube changes break older yt-dlp versions regularly. Always use
        # the freshest release available at run time.
        run: pip install --upgrade yt-dlp

      - name: Regenerate MRSS feed in-memory
        # The 06:00 MRSS workflow commits feeds/avforums.xml daily. Here we
        # regenerate at 01:00 so sync uses the absolute latest YouTube state,
        # not yesterday's committed feed. No commit step — the 06:00 workflow
        # is the canonical regenerator.
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          python youtube_mrss.py \
            --channel UCnOIS_Yb-gVJjzKlauXrf9w \
            --output feeds/avforums.xml

      - name: Sync new videos to Connatix
        env:
          CONNATIX_EMAIL: ${{ secrets.CONNATIX_EMAIL }}
          CONNATIX_PASSWORD: ${{ secrets.CONNATIX_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "DRY RUN MODE — no uploads will happen"
            python sync_to_connatix.py --feed feeds/avforums.xml --dry-run
          else
            python sync_to_connatix.py --feed feeds/avforums.xml
          fi

      - name: Clean up GitHub releases for synced videos
        # Releases were created during sync to stage video files for Connatix
        # to pull. Once Connatix has them, the staging releases are dead
        # weight. The script's tracking file records release IDs purely so
        # this cleanup step can find them.
        if: success() && inputs.dry_run != 'true'
        env:
          CONNATIX_EMAIL: ${{ secrets.CONNATIX_EMAIL }}
          CONNATIX_PASSWORD: ${{ secrets.CONNATIX_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python sync_to_connatix.py --cleanup
